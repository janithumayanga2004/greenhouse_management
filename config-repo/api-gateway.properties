# Server
server.port=8080

# JWT secret (same as auth-service - used for validating tokens)
jwt.secret=agms2024SecretKeyForJwtSigningMustBe256BitsLong!!

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=zone-service
spring.cloud.gateway.routes[1].uri=lb://zone-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/zones/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=sensor-service
spring.cloud.gateway.routes[2].uri=lb://sensor-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/sensors/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=automation-service
spring.cloud.gateway.routes[3].uri=lb://automation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/automation/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=crop-service
spring.cloud.gateway.routes[4].uri=lb://crop-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/crops/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
